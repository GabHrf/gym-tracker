<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Gym Tracker</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#0f1115;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}button,input,select{font:inherit}button{cursor:pointer;border:0;border-radius:12px;background:#232733;color:white;padding:10px}header{min-height:64px;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #2a2e38;position:sticky;top:0;background:#0f1115;z-index:2}header h1{text-transform:capitalize;flex:1;text-align:center;margin:0;font-size:20px}.userBadge{font-size:13px;color:#cdd6ff;background:#181b23;border:1px solid #2a2e38;border-radius:999px;padding:8px 10px;white-space:nowrap}main{display:grid;grid-template-columns:1fr 390px;min-height:calc(100vh - 64px)}.calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(105px,1fr);border-right:1px solid #2a2e38}.weekday{padding:12px;text-align:center;color:#aaa;border-bottom:1px solid #2a2e38}.day{border-radius:0;background:#12141a;border-right:1px solid #2a2e38;border-bottom:1px solid #2a2e38;text-align:left;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0}.day span{align-self:flex-end}.day small{background:#d8c15c;color:#181818;border-radius:6px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.muted{opacity:.35}.selected{outline:2px solid #77a7ff;z-index:1}.today span{background:#77a7ff;color:#07101f;border-radius:999px;padding:3px 8px}aside{padding:18px;overflow:auto}.asideTop{display:flex;gap:10px;align-items:center;justify-content:space-between}.asideTop h2{text-transform:capitalize;font-size:18px}.primary{background:#4f7cff;display:inline-flex;align-items:center;gap:6px}.danger{background:#6b2730}.empty{color:#aaa}.card{background:#181b23;border:1px solid #2a2e38;border-radius:18px;padding:14px;margin:12px 0}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.exercise{display:flex;justify-content:space-between;color:#ddd;padding:8px 0;border-top:1px solid #2a2e38}.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:12px;z-index:5}.panel{width:min(620px,100%);max-height:92vh;overflow:auto;background:#151821;border:1px solid #333846;border-radius:24px;padding:18px}label{display:flex;flex-direction:column;gap:6px;margin:10px 0;color:#bbb}input,select{background:#0f1115;color:white;border:1px solid #333846;border-radius:12px;padding:12px;width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end}.editExercise{border:1px solid #333846;border-radius:16px;padding:12px;margin:10px 0}.set{display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center;margin:8px 0}.ghost{background:#252936;color:#cdd6ff}.total{text-align:right;font-size:18px}.wide{width:100%;justify-content:center;padding:14px}.tabs{display:flex;gap:8px;margin:8px 0 14px}.tabs button{flex:1}.activeTab{background:#4f7cff}.listItem{display:grid;grid-template-columns:1fr 1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-top:1px solid #2a2e38}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login .panel{max-width:440px}.hint{color:#aaa;font-size:13px;line-height:1.4}@media(max-width:850px){header{gap:6px;overflow:auto}header h1{font-size:17px;min-width:150px}.userBadge{display:none}main{display:block}.calendar{border-right:0;grid-auto-rows:92px}.weekday{font-size:12px}.day{font-size:13px}.day small{font-size:11px}aside{border-top:1px solid #2a2e38}.grid3,.listItem{grid-template-columns:1fr}.actions{flex-wrap:wrap}}
  </style>
</head>
<body><div id="app"></div>
<script>
const DEFAULT_EXERCISES=[
  {id:'traction',name:'Traction',category:'Dos'},
  {id:'dev-couche-machine',name:'Dev couché - Machine',category:'Pectoraux'},
  {id:'dev-militaire-machine',name:'Dev Militaire - Machine',category:'Épaules'},
  {id:'dev-militaire-banc',name:'Dev Militaire - Banc',category:'Épaules'},
  {id:'dips',name:'Dips',category:'Pectoraux'},
  {id:'skull-crusher',name:'Skull crusher',category:'Triceps'},
  {id:'curl-biceps',name:'Curl biceps',category:'Biceps'},
  {id:'extension-corde',name:'Extension à la corde',category:'Triceps'},
  {id:'tirage-horizontal',name:'Tirage horizontal',category:'Dos'},
  {id:'abdos-corde',name:'Abdos à la corde',category:'Abdos'},
  {id:'squat',name:'Squat',category:'Jambes'},
  {id:'fentes-bulgares',name:'Fentes bulgares',category:'Jambes'},
  {id:'rdl-unilateral',name:'RDL unilatéral',category:'Jambes'},
  {id:'hip-thrust',name:'Hip thrust',category:'Fessiers'},
  {id:'mollets',name:'Mollets',category:'Mollets'}
];
const EX_KEY='gym-tracker-exercises-v4', USER_KEY='gym-tracker-current-user-v4';
const pad=n=>String(n).padStart(2,'0'); const dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; const todayKey=dateKey(new Date());
const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+''+Math.random();
const slug=s=>String(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'')||'user';
let current=new Date(), selected=todayKey, editing=null, screen='calendar', editingExercise=null;
let currentUser=localStorage.getItem(USER_KEY)||'';
let exercises=JSON.parse(localStorage.getItem(EX_KEY)||'null')||DEFAULT_EXERCISES;
let sessions=[];
function sessionKey(){return 'gym-tracker-sessions-v4-'+slug(currentUser)}
function loadSessions(){sessions=currentUser?JSON.parse(localStorage.getItem(sessionKey())||'[]'):[]}
function saveSessions(){localStorage.setItem(sessionKey(),JSON.stringify(sessions))}
function saveExercises(){localStorage.setItem(EX_KEY,JSON.stringify(exercises))}
function categories(){return [...new Set(exercises.map(e=>e.category||'Sans catégorie'))].sort((a,b)=>a.localeCompare(b,'fr'))}
function firstExercise(){return exercises[0]||{id:'',name:'Aucun exercice',category:'Sans catégorie'}}
const emptySet=()=>({reps:10,weight:0});
const emptyExercise=()=>{const e=firstExercise(); return {category:e.category,exerciseId:e.id,name:e.name,sets:[emptySet()]}}
const emptySession=(date=todayKey)=>({id:uid(),name:'',date,start:'18:00',end:'19:00',exercises:[emptyExercise()]});
const volume=s=>(s.exercises||[]).reduce((t,e)=>t+(e.sets||[]).reduce((u,set)=>u+(+set.reps||0)*(+set.weight||0),0),0);
function monthDays(){const y=current.getFullYear(),m=current.getMonth(),first=new Date(y,m,1),start=new Date(first);start.setDate(1-((first.getDay()+6)%7));return Array.from({length:42},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d})}
function byDate(){return sessions.reduce((a,s)=>((a[s.date]??=[]).push(s),a),{})}
function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function render(){ if(!currentUser) return renderLogin(); loadSessions(); const bd=byDate(), days=monthDays(), sel=bd[selected]||[]; document.getElementById('app').innerHTML=`<header><span class="userBadge">${esc(currentUser)}</span><button onclick="screen='calendar';render()">Planning</button><button onclick="screen='exercises';render()">Exercices</button><button onclick="logout()">Changer</button>${screen==='calendar'?`<button onclick="changeMonth(-1)">‹</button><h1>${current.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</h1><button onclick="changeMonth(1)">›</button>`:`<h1>Exercices</h1>`}</header>${screen==='calendar'?calendarHtml(bd,days,sel):exercisesHtml()}${editing?editorHtml():''}${editingExercise?exerciseEditorHtml():''}`}
function renderLogin(){document.getElementById('app').innerHTML=`<div class="login"><form class="panel" onsubmit="login(event)"><h1>Gym Tracker</h1><p class="hint">Entre ton prénom pour accéder à ton planning personnel sur cet appareil.</p><label>Prénom<input id="loginName" required autocomplete="given-name" placeholder="Ex : Gabriel"></label><button class="primary wide">Accéder au planning</button></form></div>`}
function login(e){e.preventDefault(); currentUser=document.getElementById('loginName').value.trim(); localStorage.setItem(USER_KEY,currentUser); loadSessions(); render()} function logout(){currentUser='';localStorage.removeItem(USER_KEY);render()}
function calendarHtml(bd,days,sel){return `<main><section class="calendar">${['Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.','Dim.'].map(d=>`<b class="weekday">${d}</b>`).join('')}${days.map(d=>{const k=dateKey(d),inM=d.getMonth()===current.getMonth();return `<button class="day ${!inM?'muted':''} ${k===selected?'selected':''} ${k===todayKey?'today':''}" onclick="selectDay('${k}')"><span>${d.getDate()}</span>${(bd[k]||[]).map(s=>`<small>${esc(s.name)||'Séance'} · ${volume(s)} kg</small>`).join('')}</button>`}).join('')}</section><aside><div class="asideTop"><h2>${new Date(selected+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</h2><button class="primary" onclick="openEditor()">+ Ajouter</button></div>${sel.length?'':'<p class="empty">Aucune séance ce jour.</p>'}${sel.map(s=>`<article class="card"><div class="row"><h3>${esc(s.name)||'Séance'}<br><small>${s.start} - ${s.end}</small></h3><strong>${volume(s)} kg</strong></div>${(s.exercises||[]).map(e=>`<div class="exercise"><b>${esc(e.name)}</b><span>${(e.sets||[]).length} série(s)</span></div>`).join('')}<div class="actions"><button onclick="editSession('${s.id}')">Modifier</button><button class="danger" onclick="deleteSession('${s.id}')">Supprimer</button></div></article>`).join('')}</aside></main>`}
function exercisesHtml(){return `<main><aside style="grid-column:1/-1;max-width:900px;width:100%;margin:auto"><div class="asideTop"><h2>Exercices disponibles</h2><button class="primary" onclick="newExercise()">+ Ajouter</button></div>${categories().map(cat=>`<article class="card"><h3>${esc(cat)}</h3>${exercises.filter(e=>(e.category||'Sans catégorie')===cat).map(e=>`<div class="listItem"><b>${esc(e.name)}</b><span>${esc(e.category)}</span><button onclick="editExercise('${e.id}')">Modifier</button><button class="danger" onclick="deleteExercise('${e.id}')">Supprimer</button></div>`).join('')}</article>`).join('')}</aside></main>`}
function changeMonth(n){current=new Date(current.getFullYear(),current.getMonth()+n,1);render()} function selectDay(k){selected=k;render()} function openEditor(){editing=emptySession(selected);render()} function editSession(id){editing=JSON.parse(JSON.stringify(sessions.find(s=>s.id===id))); editing.exercises=(editing.exercises||[]).map(x=>({...x,category:x.category||((exercises.find(e=>e.name===x.name)||{}).category)||categories()[0]})); render()} function deleteSession(id){if(confirm('Supprimer cette séance ?')){sessions=sessions.filter(s=>s.id!==id);saveSessions();render()}} function closeEditor(){editing=null;render()}
function editorHtml(){return `<div class="modal"><form class="panel" onsubmit="submitEditor(event)"><div class="row"><h2>Séance</h2><button type="button" onclick="closeEditor()">×</button></div><label>Nom de la séance<input value="${esc(editing.name)}" placeholder="Ex : Push, Pull, Jambes..." oninput="editing.name=this.value"></label><label>Date<input type="date" value="${editing.date}" onchange="editing.date=this.value"></label><div class="grid2"><label>Début<input type="time" value="${editing.start}" onchange="editing.start=this.value"></label><label>Fin<input type="time" value="${editing.end}" onchange="editing.end=this.value"></label></div><h3>Exercices</h3>${(editing.exercises||[]).map((ex,i)=>exerciseBlock(ex,i)).join('')}<button type="button" class="ghost" onclick="addEx()">+ Ajouter un exercice</button><p class="total">Volume total : <b>${volume(editing)} kg</b></p><button class="primary wide">Enregistrer</button></form></div>`}
function exerciseBlock(ex,i){const cat=ex.category||categories()[0]; const list=exercises.filter(e=>(e.category||'Sans catégorie')===cat); if(!list.find(e=>e.id===ex.exerciseId)&&list[0]){ex.exerciseId=list[0].id;ex.name=list[0].name} return `<div class="editExercise"><div class="grid3"><label>Catégorie<select onchange="changeExCategory(${i},this.value)">${categories().map(c=>`<option ${c===cat?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label>Exercice<select onchange="changeExName(${i},this.value)">${list.map(e=>`<option value="${e.id}" ${e.id===ex.exerciseId?'selected':''}>${esc(e.name)}</option>`).join('')}</select></label><button type="button" class="danger" onclick="removeEx(${i})">Supprimer</button></div>${(ex.sets||[]).map((set,j)=>`<div class="set"><span>Série ${j+1}</span><input type="number" min="0" value="${set.reps}" onchange="editing.exercises[${i}].sets[${j}].reps=this.value;render()" placeholder="reps"><input type="number" min="0" step="0.5" value="${set.weight}" onchange="editing.exercises[${i}].sets[${j}].weight=this.value;render()" placeholder="kg"></div>`).join('')}<button type="button" class="ghost" onclick="addSet(${i})">+ Ajouter une série</button></div>`}
function changeExCategory(i,cat){const first=exercises.find(e=>(e.category||'Sans catégorie')===cat); editing.exercises[i].category=cat; if(first){editing.exercises[i].exerciseId=first.id; editing.exercises[i].name=first.name} render()} function changeExName(i,id){const e=exercises.find(x=>x.id===id); if(e){editing.exercises[i].exerciseId=e.id;editing.exercises[i].name=e.name;editing.exercises[i].category=e.category} render()} function addSet(i){editing.exercises[i].sets.push(emptySet());render()} function addEx(){editing.exercises.push(emptyExercise());render()} function removeEx(i){editing.exercises.splice(i,1);render()} function submitEditor(e){e.preventDefault(); const i=sessions.findIndex(s=>s.id===editing.id); if(i>=0)sessions[i]=editing; else sessions.push(editing); selected=editing.date; editing=null; saveSessions(); render()}
function newExercise(){editingExercise={id:uid(),name:'',category:categories()[0]||'Général',isNew:true};render()} function editExercise(id){editingExercise={...exercises.find(e=>e.id===id),isNew:false};render()} function closeExerciseEditor(){editingExercise=null;render()} function exerciseEditorHtml(){return `<div class="modal"><form class="panel" onsubmit="saveExerciseEditor(event)"><div class="row"><h2>Exercice</h2><button type="button" onclick="closeExerciseEditor()">×</button></div><label>Nom<input required value="${esc(editingExercise.name)}" oninput="editingExercise.name=this.value" placeholder="Ex : Développé couché"></label><label>Catégorie<input required value="${esc(editingExercise.category)}" oninput="editingExercise.category=this.value" list="catList" placeholder="Ex : Dos, Pectoraux..."><datalist id="catList">${categories().map(c=>`<option value="${esc(c)}">`).join('')}</datalist></label><button class="primary wide">Enregistrer</button></form></div>`}
function saveExerciseEditor(e){e.preventDefault(); editingExercise.name=editingExercise.name.trim(); editingExercise.category=editingExercise.category.trim()||'Sans catégorie'; if(!editingExercise.name)return; if(editingExercise.isNew){exercises.push({id:editingExercise.id,name:editingExercise.name,category:editingExercise.category})}else{const i=exercises.findIndex(x=>x.id===editingExercise.id); if(i>=0)exercises[i]={id:editingExercise.id,name:editingExercise.name,category:editingExercise.category}} saveExercises(); editingExercise=null; render()} function deleteExercise(id){if(!confirm('Supprimer cet exercice ? Les anciennes séances garderont leur nom, mais il ne sera plus proposé dans la liste.'))return; exercises=exercises.filter(e=>e.id!==id); saveExercises(); render()}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{}); render();
</script></body></html>
