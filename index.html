<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Gym Tracker</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#0f1115;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}button,input,select{font:inherit}button{cursor:pointer;border:0;border-radius:12px;background:#232733;color:white;padding:10px}header{height:64px;display:flex;align-items:center;gap:10px;padding:0 12px;border-bottom:1px solid #2a2e38}header h1{text-transform:capitalize;flex:1;text-align:center;margin:0;font-size:21px}.manage{background:#30405f}.calendar{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(105px,1fr);border-right:1px solid #2a2e38}main{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 64px)}.weekday{padding:12px;text-align:center;color:#aaa;border-bottom:1px solid #2a2e38}.day{border-radius:0;background:#12141a;border-right:1px solid #2a2e38;border-bottom:1px solid #2a2e38;text-align:left;padding:8px;display:flex;flex-direction:column;gap:6px;min-width:0}.day span{align-self:flex-end}.day small{background:#d8c15c;color:#181818;border-radius:6px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.muted{opacity:.35}.selected{outline:2px solid #77a7ff;z-index:1}.today span{background:#77a7ff;color:#07101f;border-radius:999px;padding:3px 8px}aside{padding:18px;overflow:auto}.asideTop{display:flex;gap:10px;align-items:center;justify-content:space-between}.asideTop h2{text-transform:capitalize;font-size:18px}.primary{background:#4f7cff;display:inline-flex;align-items:center;gap:6px}.empty{color:#aaa}.card{background:#181b23;border:1px solid #2a2e38;border-radius:18px;padding:14px;margin:12px 0}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.exercise{display:flex;justify-content:space-between;color:#ddd;padding:8px 0;border-top:1px solid #2a2e38}.actions{display:flex;gap:8px;margin-top:10px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;padding:12px}.panel{width:min(580px,100%);max-height:92vh;overflow:auto;background:#151821;border:1px solid #333846;border-radius:24px;padding:18px}label{display:flex;flex-direction:column;gap:6px;margin:10px 0;color:#bbb}input,select{background:#0f1115;color:white;border:1px solid #333846;border-radius:12px;padding:12px;width:100%}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.editExercise{border:1px solid #333846;border-radius:16px;padding:12px;margin:10px 0}.set{display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center;margin:8px 0}.ghost{background:#252936;color:#cdd6ff}.danger{background:#5a2630}.total{text-align:right;font-size:18px}.wide{width:100%;justify-content:center;padding:14px}.exItem{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;border:1px solid #333846;border-radius:14px;padding:10px;margin:8px 0}.hint{color:#aaa;font-size:13px;line-height:1.4}@media(max-width:850px){header{gap:6px;padding:0 8px}header h1{font-size:16px}.manage{font-size:12px;padding:9px}main{display:block}.calendar{border-right:0;grid-auto-rows:92px}.weekday{font-size:12px}.day{font-size:13px}.day small{font-size:11px}aside{border-top:1px solid #2a2e38}.actions{flex-wrap:wrap}.exItem{grid-template-columns:1fr auto}.exItem .danger{grid-column:2}.set{grid-template-columns:62px 1fr 1fr}}
  </style>
</head>
<body><div id="app"></div>
<script>
const DEFAULT_EXERCISES=['exo 1','exo 2','exo 3'], KEY='gym-tracker-sessions-v2', EX_KEY='gym-tracker-exercises-v1';
const pad=n=>String(n).padStart(2,'0'); const dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; const todayKey=dateKey(new Date());
let current=new Date(), selected=todayKey, editing=null, managingExercises=false;
let sessions=JSON.parse(localStorage.getItem(KEY)||'[]');
let exercises=JSON.parse(localStorage.getItem(EX_KEY)||'null')||DEFAULT_EXERCISES;
const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+''+Math.random();
const saveStore=()=>localStorage.setItem(KEY,JSON.stringify(sessions));
const saveExercises=()=>localStorage.setItem(EX_KEY,JSON.stringify(exercises));
const emptySet=()=>({reps:10,weight:0});
const emptyExercise=()=>({name:exercises[0]||'Nouvel exercice',sets:[emptySet()]});
const emptySession=(date=todayKey)=>({id:uid(),date,start:'18:00',end:'19:00',exercises:[emptyExercise()]});
const volume=s=>(s.exercises||[]).reduce((t,e)=>t+(e.sets||[]).reduce((u,set)=>u+(+set.reps||0)*(+set.weight||0),0),0);
function monthDays(){const y=current.getFullYear(),m=current.getMonth(),first=new Date(y,m,1),start=new Date(first);start.setDate(1-((first.getDay()+6)%7));return Array.from({length:42},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d})}
function byDate(){return sessions.reduce((a,s)=>((a[s.date]??=[]).push(s),a),{})}
function render(){const bd=byDate(), days=monthDays(), sel=bd[selected]||[];document.getElementById('app').innerHTML=`<header><button onclick="changeMonth(-1)">‹</button><h1>${current.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</h1><button onclick="changeMonth(1)">›</button><button class="manage" onclick="openExerciseManager()">Exercices</button></header><main><section class="calendar">${['Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.','Dim.'].map(d=>`<b class="weekday">${d}</b>`).join('')}${days.map(d=>{const k=dateKey(d),inM=d.getMonth()===current.getMonth();return `<button class="day ${!inM?'muted':''} ${k===selected?'selected':''} ${k===todayKey?'today':''}" onclick="selectDay('${k}')"><span>${d.getDate()}</span>${(bd[k]||[]).map(s=>`<small>${s.start} · ${volume(s)} kg</small>`).join('')}</button>`}).join('')}</section><aside><div class="asideTop"><h2>${new Date(selected+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</h2><button class="primary" onclick="openEditor()">+ Ajouter</button></div>${sel.length?'':'<p class="empty">Aucune séance ce jour.</p>'}${sel.map(s=>`<article class="card"><div class="row"><h3>${s.start} - ${s.end}</h3><strong>${volume(s)} kg</strong></div>${(s.exercises||[]).map(e=>`<div class="exercise"><b>${e.name}</b><span>${(e.sets||[]).length} série(s)</span></div>`).join('')}<div class="actions"><button onclick="editSession('${s.id}')">Modifier</button><button onclick="deleteSession('${s.id}')">Supprimer</button></div></article>`).join('')}</aside></main>${editing?editorHtml():''}${managingExercises?exerciseManagerHtml():''}`}
function changeMonth(n){current=new Date(current.getFullYear(),current.getMonth()+n,1);render()} function selectDay(k){selected=k;render()} function openEditor(){editing=emptySession(selected);render()} function editSession(id){editing=JSON.parse(JSON.stringify(sessions.find(s=>s.id===id)));render()} function deleteSession(id){if(confirm('Supprimer cette séance ?')){sessions=sessions.filter(s=>s.id!==id);saveStore();render()}} function closeEditor(){editing=null;render()}
function editorHtml(){return `<div class="modal"><form class="panel" onsubmit="submitEditor(event)"><div class="row"><h2>Séance</h2><button type="button" onclick="closeEditor()">×</button></div><label>Date<input type="date" value="${editing.date}" onchange="editing.date=this.value"></label><div class="grid2"><label>Début<input type="time" value="${editing.start}" onchange="editing.start=this.value"></label><label>Fin<input type="time" value="${editing.end}" onchange="editing.end=this.value"></label></div><h3>Exercices</h3>${(editing.exercises||[]).map((ex,i)=>`<div class="editExercise"><div class="row"><select onchange="editing.exercises[${i}].name=this.value;render()">${exercises.map(x=>`<option ${x===ex.name?'selected':''}>${x}</option>`).join('')}</select><button type="button" onclick="removeEx(${i})">Supprimer</button></div>${(ex.sets||[]).map((set,j)=>`<div class="set"><span>Série ${j+1}</span><input type="number" min="0" value="${set.reps}" onchange="editing.exercises[${i}].sets[${j}].reps=this.value;render()" placeholder="reps"><input type="number" min="0" step="0.5" value="${set.weight}" onchange="editing.exercises[${i}].sets[${j}].weight=this.value;render()" placeholder="kg"></div>`).join('')}<button type="button" class="ghost" onclick="addSet(${i})">+ Ajouter une série</button></div>`).join('')}<button type="button" class="ghost" onclick="addEx()">+ Ajouter un exercice</button><p class="total">Volume total : <b>${volume(editing)} kg</b></p><button class="primary wide">Enregistrer</button></form></div>`}
function openExerciseManager(){managingExercises=true;render()} function closeExerciseManager(){managingExercises=false;render()}
function exerciseManagerHtml(){return `<div class="modal"><section class="panel"><div class="row"><h2>Exercices disponibles</h2><button type="button" onclick="closeExerciseManager()">×</button></div><p class="hint">Tu peux créer, modifier ou supprimer les exercices. Les anciennes séances gardent le nom enregistré au moment de la séance.</p>${exercises.map((name,i)=>`<div class="exItem"><input value="${name.replaceAll('&','&amp;').replaceAll('"','&quot;')}" onchange="renameExercise(${i},this.value)"><button onclick="renameExercise(${i},this.previousElementSibling.value)">Modifier</button><button class="danger" onclick="deleteExercise(${i})">Supprimer</button></div>`).join('')}<button class="primary wide" onclick="addExercise()">+ Créer un exercice</button></section></div>`}
function addExercise(){const name=prompt('Nom du nouvel exercice :'); if(!name||!name.trim())return; exercises.push(name.trim()); saveExercises(); render()}
function renameExercise(i,name){name=(name||'').trim(); if(!name)return alert('Le nom ne peut pas être vide.'); exercises[i]=name; saveExercises(); render()}
function deleteExercise(i){if(exercises.length<=1)return alert('Il faut garder au moins un exercice.'); if(confirm(`Supprimer "${exercises[i]}" de la liste ?`)){exercises.splice(i,1); saveExercises(); render()}}
function addSet(i){editing.exercises[i].sets.push(emptySet());render()} function addEx(){editing.exercises.push(emptyExercise());render()} function removeEx(i){editing.exercises.splice(i,1);render()} function submitEditor(e){e.preventDefault(); const i=sessions.findIndex(s=>s.id===editing.id); if(i>=0)sessions[i]=editing; else sessions.push(editing); selected=editing.date; editing=null; saveStore(); render()}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{}); render();
</script></body></html>
